name: Sincronización de Datos BI

on:
  schedule:
    # Se ejecuta cada 6 horas (a las 00:00, 06:00, 12:00 y 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Permite ejecutar el flujo manualmente desde la interfaz de GitHub

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv supabase psycopg2-binary

    - name: Configurar hosts para evitar fallos de DNS
      run: |
        echo "181.13.88.182 identityout.gruposantafe.com.ar" | sudo tee -a /etc/hosts
        echo "181.13.88.182 apiestadisticas.gruposantafe.com.ar" | sudo tee -a /etc/hosts

    - name: Ejecutar script de sincronización
      env:
        API_BASE_URL: ${{ secrets.API_BASE_URL }}
        API_IDENTITY_URL: ${{ secrets.API_IDENTITY_URL }}
        API_EMAIL: ${{ secrets.API_EMAIL }}
        API_PASSWORD: ${{ secrets.API_PASSWORD }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: python sync_data.py

